<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Sofía 😍</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #050001; overflow: hidden; touch-action: none; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #welcomeScreen { position: relative; z-index: 100; text-align: center; transition: opacity 0.8s; }
        #welcomeScreen h2 { 
            font-family: 'Dancing Script', cursive; color: #fff; font-size: 1.8rem; 
            text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d; padding: 0 20px;
        }
        #startBtn { background: none; border: none; font-size: 85px; cursor: pointer; animation: pulse 1.5s infinite; filter: drop-shadow(0 0 15px #ff4d6d); }

        .container { 
            position: relative; width: 85%; max-width: 450px; z-index: 50; 
            text-align: center; pointer-events: none; display: none; 
        }
        
        #typewriter { 
            font-family: 'Great Vibes', cursive; color: #ffffff;
            font-size: clamp(1.5rem, 7vw, 2.4rem); line-height: 1.4; 
            text-shadow: 
                3px 3px 0px #000, -3px -3px 0px #000, 
                3px -3px 0px #000, -3px 3px 0px #000,
                0 0 25px rgba(255, 77, 109, 1);
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
        }
        
        /* Efecto Sofia Explosivo */
        .sofia-pop { 
            position: absolute; font-family: 'Dancing Script', cursive; color: #fff; 
            font-size: 2.2rem; pointer-events: none; z-index: 100; 
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 20px #ff4d6d; 
            animation: sofiaBurst 2.2s ease-out forwards; 
            white-space: nowrap;
        }

        @keyframes sofiaBurst {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -250%) scale(1.5); opacity: 0; }
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <audio id="miMusica" src="música.mp3" preload="auto" loop></audio>

    <div id="welcomeScreen">
        <h2>Toca el corazón mi niña preciosa Sofía 😍</h2>
        <button id="startBtn">💗</button>
    </div>

    <div class="container" id="mainUI">
        <div id="typewriter"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const mainUI = document.getElementById('mainUI');
        const textElement = document.getElementById('typewriter');
        const musica = document.getElementById('miMusica');

        const frase = "Somos muy jóvenes para prometernos un \"para siempre\" pero llegaré contigo hasta donde me lo permitas 💗";
        let particles = [], stars = [], fireworks = [];
        let index = 0, active = false, width, height, heartScale;

        function typeWriter() {
            if (index < frase.length) {
                textElement.innerHTML = frase.substring(0, index + 1);
                index++;
                setTimeout(typeWriter, 70);
            } else {
                startMassiveExplosions();
            }
        }

        function startMassiveExplosions() {
            // Intervalo que lanza ráfagas de 8 en 8
            setInterval(() => {
                for(let i=0; i<8; i++) {
                    setTimeout(() => {
                        const rx = Math.random() * (width * 0.9) + (width * 0.05);
                        const ry = Math.random() * (height * 0.9) + (height * 0.05);
                        createExplosion(rx, ry);
                    }, i * 150); // Pequeño desfase para que no salgan todas al mismo milisegundo
                }
            }, 3000); // Ráfaga cada 3 segundos
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            heartScale = (Math.min(width, height) / 32) * 0.95;
            initStars();
            if(active) initHeart();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({ x: Math.random() * width, y: Math.random() * height, s: Math.random() * 2, v: Math.random() * 0.6 + 0.2 });
            }
        }

        function initHeart() {
            particles = [];
            for (let i = 0; i < 900; i++) {
                const t = Math.PI * 2 * (i / 900);
                const tx = 16 * Math.pow(Math.sin(t), 3) * heartScale + width / 2;
                const ty = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * heartScale + height / 2;
                particles.push({ x: width/2, y: height/2, tx, ty, vx: 0, vy: 0, c: `hsla(${Math.random()*25+335}, 100%, 70%, 0.8)` });
            }
        }

        function createExplosion(x, y) {
            const span = document.createElement('span');
            span.className = 'sofia-pop';
            span.innerText = 'Sofia';
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 2200);

            for (let i = 0; i < 25; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1;
                fireworks.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, c: Math.random() > 0.5 ? '#ff4d6d' : '#ffd700' });
            }
        }

        startBtn.addEventListener('click', () => {
            musica.play().catch(() => {});
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                mainUI.style.display = 'block';
                active = true;
                initHeart();
                typeWriter();
            }, 800);
        });

        window.addEventListener('mousedown', e => { if(active) createExplosion(e.clientX, e.clientY); });
        window.addEventListener('touchstart', e => { if(active) createExplosion(e.touches[0].clientX, e.touches[0].clientY); });

        function animate() {
            ctx.fillStyle = '#050001';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = "rgba(255, 200, 220, 0.4)";
            stars.forEach(s => {
                s.y += s.v; if(s.y > height) s.y = 0;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            });

            if(active) {
                ctx.globalCompositeOperation = 'lighter';
                particles.forEach(p => {
                    p.x += (p.tx - p.x) * 0.07 + p.vx;
                    p.y += (p.ty - p.y) * 0.07 + p.vy;
                    p.vx *= 0.94; p.vy *= 0.94;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 1.3, 0, Math.PI*2);
                    ctx.fillStyle = p.c; ctx.fill();
                });

                fireworks.forEach((f, i) => {
                    f.x += f.vx; f.y += f.vy; f.vy += 0.07; f.life -= 0.012;
                    if(f.life <= 0) fireworks.splice(i, 1);
                    ctx.beginPath(); ctx.arc(f.x, f.y, 2, 0, Math.PI*2);
                    ctx.fillStyle = f.c; ctx.globalAlpha = f.life; ctx.fill();
                });
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize(); animate();
    </script>
</body>
</html>
