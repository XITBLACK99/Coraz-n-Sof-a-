<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Sofía 😍</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000; overflow: hidden; touch-action: none; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Pantalla de Inicio Limpia */
        #welcomeScreen { position: relative; z-index: 100; text-align: center; transition: opacity 0.8s; }
        #welcomeScreen h2 { 
            font-family: 'Dancing Script', cursive; color: #fff; font-size: 1.8rem; 
            text-shadow: 0 0 15px #ff4d6d; padding: 0 20px;
        }
        #startBtn { background: none; border: none; font-size: 100px; cursor: pointer; animation: pulse 1.5s infinite; filter: drop-shadow(0 0 20px #ff4d6d); }

        /* Contenedor de Texto con Máxima Legibilidad */
        .container { 
            position: relative; width: 85%; max-width: 480px; z-index: 50; 
            text-align: center; pointer-events: none; display: none; 
        }
        #typewriter { 
            font-family: 'Great Vibes', cursive; 
            color: #ffffff; 
            font-size: clamp(1.6rem, 7.5vw, 2.8rem); 
            line-height: 1.4; 
            /* Sombra de alta definición para lectura clara */
            text-shadow: 
                2px 2px 0px #000, 
                -2px -2px 0px #000, 
                2px -2px 0px #000, 
                -2px 2px 0px #000,
                0 0 20px rgba(255, 77, 109, 0.5);
        }
        
        /* Efecto Sofia al tocar */
        .sofia-pop { 
            position: absolute; font-family: 'Dancing Script', cursive; color: #fff; 
            font-size: 2.5rem; pointer-events: none; z-index: 100; 
            text-shadow: 0 0 15px #ff4d6d, 2px 2px 5px #000; 
            animation: sofiaFly 1.2s ease-out forwards; 
        }

        @keyframes sofiaFly {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translate(-50%, -180%) scale(1.3); opacity: 0; }
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    </style>
</head>
<body>

    <audio id="miMusica" src="música.mp3" preload="auto"></audio>

    <div id="welcomeScreen">
        <h2>Toca el corazón mi niña preciosa Sofía 😍</h2>
        <button id="startBtn">💗</button>
    </div>

    <div class="container" id="mainUI">
        <div id="typewriter"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const mainUI = document.getElementById('mainUI');
        const textElement = document.getElementById('typewriter');
        const musica = document.getElementById('miMusica');

        const frase = "Somos muy jóvenes para prometernos un \"para siempre\" pero llegaré contigo hasta donde me lo permitas 💗";
        let particles = [], stars = [], fireworks = [];
        let index = 0, active = false, width, height, heartScale;

        function typeWriter() {
            if (index < frase.length) {
                textElement.innerHTML = frase.substring(0, index + 1);
                index++;
                setTimeout(typeWriter, 75);
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            heartScale = (Math.min(width, height) / 32) * 0.95;
            initStars();
            if(active) initHeart();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({ x: Math.random() * width, y: Math.random() * height, s: Math.random() * 1.5, v: Math.random() * 0.5 + 0.2 });
            }
        }

        function initHeart() {
            particles = [];
            for (let i = 0; i < 900; i++) {
                const t = Math.PI * 2 * (i / 900);
                const tx = 16 * Math.pow(Math.sin(t), 3) * heartScale + width / 2;
                const ty = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * heartScale + height / 2;
                particles.push({ x: width/2, y: height/2, tx, ty, vx: 0, vy: 0, c: `hsla(${Math.random()*20+345}, 100%, 75%, 0.85)` });
            }
        }

        function createExplosion(x, y) {
            const span = document.createElement('span');
            span.className = 'sofia-pop';
            span.innerText = 'Sofia';
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 1200);

            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 7 + 2;
                fireworks.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, c: Math.random() > 0.5 ? '#ff4d6d' : '#ffcc33' });
            }
        }

        startBtn.addEventListener('click', () => {
            musica.play().catch(() => {});
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                mainUI.style.display = 'block';
                active = true;
                initHeart();
                typeWriter();
            }, 800);
        });

        window.addEventListener('mousedown', e => { if(active) createExplosion(e.clientX, e.clientY); });
        window.addEventListener('touchstart', e => { if(active) createExplosion(e.touches[0].clientX, e.touches[0].clientY); });

        function animate() {
            ctx.fillStyle = '#000'; // Fondo negro puro para que todo resalte
            ctx.fillRect(0, 0, width, height);

            // Estrellas de fondo
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            stars.forEach(s => {
                s.y += s.v; if(s.y > height) s.y = 0;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            });

            if(active) {
                ctx.globalCompositeOperation = 'lighter';
                // Corazón de neón
                particles.forEach(p => {
                    p.x += (p.tx - p.x) * 0.07 + p.vx;
                    p.y += (p.ty - p.y) * 0.07 + p.vy;
                    p.vx *= 0.9; p.vy *= 0.9;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 1.4, 0, Math.PI*2);
                    ctx.fillStyle = p.c; ctx.fill();
                });

                // Explosiones
                fireworks.forEach((f, i) => {
                    f.x += f.vx; f.y += f.vy; f.vy += 0.15; f.life -= 0.02;
                    if(f.life <= 0) fireworks.splice(i, 1);
                    ctx.beginPath(); ctx.arc(f.x, f.y, 2.5, 0, Math.PI*2);
                    ctx.fillStyle = f.c; ctx.globalAlpha = f.life; ctx.fill();
                });
                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize(); animate();
    </script>
</body>
</html>
